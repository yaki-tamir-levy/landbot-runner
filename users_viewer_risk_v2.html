<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOT Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.1/dist/umd/supabase.js"></script>
  <style>
    :root{--bg:#111;--card:#1b1b1b;--line:#2d2d2d;--ink:#f3f4f6;--muted:#9ca3af;--ok:#7dd3fc;--warn:#fbbf24;}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;direction:ltr}
    .wrap{max-width:none;margin:0;padding:22px 18px}
    .top{border:1px solid #3a3a3a;border-radius:0;padding:18px 0 24px 0;margin-bottom:18px}
    h1{margin:0 0 8px 0;font-size:26px;font-weight:900}
    .sub{color:#d1d5db;font-size:15px}
    .status{margin:12px 0;color:#fca5a5;font-weight:700}
    .list{display:flex;flex-direction:column;gap:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 18px 24px 18px;border-left:2px solid #16a34a}
    .card.running{border-left-color:#f59e0b}
    .card.completed{border-left-color:#16a34a}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    .title{font-size:22px;font-weight:900;line-height:1.3}
    .phone{color:var(--muted);font-size:14px;margin-top:2px}
    .state{font-size:16px;color:#e5e7eb;white-space:nowrap;margin-top:2px}
    .headerline{font-weight:900;font-size:20px;line-height:1.3}
    .legacy-title{font-weight:900;font-size:22px;line-height:1.3}
    .events{border-top:1px solid var(--line);margin-top:10px}
    .event{padding:11px 0;border-bottom:1px solid var(--line)}
    .event-name{font-size:20px;color:#f9fafb;line-height:1.25}
    .event-source{font-size:14px;color:var(--muted);margin-top:5px}
    .sep{color:#cbd5e1;letter-spacing:1px}
    .empty{color:var(--muted);border:1px solid var(--line);border-radius:12px;padding:18px;background:var(--card)}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>BOT Monitor</h1>
    <div class="sub">Conversation Trace - Version 1.1 - Last refresh: <span id="lastRefresh">--:--:--</span></div>
  </div>
  <div id="status" class="status"></div>
  <div id="out" class="list"></div>
</div>

<script>
(function(){
  'use strict';

  var SUPABASE_URL = 'https://qcwimczsiuxkarwfiyai.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjd2ltY3pzaXV4a2Fyd2ZpeWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM1OTEwMzgsImV4cCI6MjA2OTE2NzAzOH0.zpMcORTD1voqZFj5QaPUc-EXf1juqnlTTP00jV6_TvI';
  var VIEW = 'conversation_events_v2_view';
  var REFRESH_MS = 30000;

  var elOut = document.getElementById('out');
  var elStatus = document.getElementById('status');
  var elLast = document.getElementById('lastRefresh');

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g,function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
  }

  function sourceLabel(src){
    var s = String(src == null ? '' : src).trim().toUpperCase();
    if (s === 'A') return 'A • מטפל וירטואלי';
    if (s === 'B') return 'B • מדריך קורס';
    return s;
  }

  function formatStartedAt(v){
    try{
      var s = String(v || '').trim();
      if (!s) return '';
      var iso = s.replace(' ', 'T').replace(/(\.\d{3})\d+/, '$1').replace(/([+-]\d{2})$/, '$1:00');
      var d = new Date(iso);
      if (isNaN(d.getTime())) return s;
      var parts = new Intl.DateTimeFormat('he-IL', {
        timeZone:'Asia/Jerusalem', year:'2-digit', month:'2-digit', day:'2-digit',
        hour:'2-digit', minute:'2-digit', hour12:false
      }).formatToParts(d);
      function part(t){ var x = parts.find(function(p){ return p.type === t; }); return x ? x.value : ''; }
      return part('day') + '.' + part('month') + '.' + part('year') + ' ' + part('hour') + ':' + part('minute');
    }catch(e){ return String(v || ''); }
  }

  function updateClock(){
    try{
      elLast.textContent = new Date().toLocaleTimeString('he-IL', { timeZone:'Asia/Jerusalem', hour12:false });
    }catch(e){
      elLast.textContent = new Date().toLocaleTimeString();
    }
  }

  function suffixOf(row){
    if (row && row.conversation_suffix) return String(row.conversation_suffix);
    if (row && row.conversation_id) return String(row.conversation_id).slice(-4);
    return '';
  }

  function statusOf(rows){
    for (var i=0;i<rows.length;i++){
      var st = rows[i] && rows[i].conversation_status;
      if (st && String(st).trim()) return String(st).trim();
    }
    return 'Running';
  }

  function eventLabel(row){
    var ev = String(row && row.event_name || '').trim();
    if (ev === 'conversation_started') return 'Conversation Started';
    if (ev === 'users_total_updated') return 'Users Total Updated';
    if (ev === 'process_queue_created') return 'Process Queue Created';
    if (ev === 'users_tzvira_updated') return 'Users Tzvira Updated';
    if (ev === 'postprocess_completed') return 'Postprocess Completed';
    if (!ev) return '';
    return ev.replace(/_/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  }

  function sourceTableLabel(row){
    var t = String(row && row.source_table || '').trim();
    if (!t) return '';
    if (t === 'process_queue_v2' || t === 'users_tzvira_v2') return '-> ' + t;
    if (t === 'separator') return '------------------------------';
    return t;
  }

  function groupRows(rows){
    var map = new Map();
    (rows || []).forEach(function(r){
      var key = r.conversation_id || r.conversation_suffix || Math.random().toString(36);
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(r);
    });
    var groups = Array.from(map.values());
    groups.sort(function(a,b){
      var ta = String((a[0] && a[0].started_at) || ''), tb = String((b[0] && b[0].started_at) || '');
      return tb.localeCompare(ta);
    });
    return groups;
  }

  function render(rows){
    var groups = groupRows(rows);
    if (!groups.length){
      elOut.innerHTML = '<div class="empty">אין נתונים להצגה.</div>';
      return;
    }

    var html = [];
    groups.forEach(function(g){
      g.sort(function(a,b){
        var ca = String(a.created_at || a.event_created_at || a.started_at || '');
        var cb = String(b.created_at || b.event_created_at || b.started_at || '');
        return ca.localeCompare(cb);
      });
      var first = g[0] || {};
      var suffix = suffixOf(first);
      var st = statusOf(g);
      var started = formatStartedAt(first.started_at);
      var src = sourceLabel(first.source);
      var phone = first.phone_masked || first.phone || '';
      var title = started ? (started + (src ? ' | ' + src : '') + ' | ' + st) : ('Conversation ' + suffix);
      var cardCls = String(st).toLowerCase() === 'completed' ? 'completed' : 'running';

      html.push('<div class="card ' + cardCls + '">');
      html.push('<div class="head">');
      html.push('<div>');
      if (started || src){
        html.push('<div class="headerline">' + escapeHtml(title) + '</div>');
        html.push('<div class="legacy-title">Conversation ' + escapeHtml(suffix) + '</div>');
      } else {
        html.push('<div class="legacy-title">Conversation ' + escapeHtml(suffix) + '</div>');
      }
      html.push('<div class="phone">' + escapeHtml(phone) + '</div>');
      html.push('</div>');
      html.push('<div class="state">' + escapeHtml(st) + '</div>');
      html.push('</div>');

      html.push('<div class="events">');
      g.forEach(function(r){
        var ev = eventLabel(r);
        var tbl = sourceTableLabel(r);
        html.push('<div class="event">');
        if (ev) html.push('<div class="event-name">' + escapeHtml(ev) + '</div>');
        if (tbl) html.push('<div class="event-source">' + escapeHtml(tbl) + '</div>');
        html.push('</div>');
      });
      html.push('</div>');
      html.push('</div>');
    });
    elOut.innerHTML = html.join('');
  }

  if (!window.supabase || !window.supabase.createClient){
    elStatus.textContent = 'שגיאה: ספריית Supabase לא נטענה.';
    return;
  }

  var supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function load(){
    updateClock();
    elStatus.textContent = '';
    var res = await supa
      .from(VIEW)
      .select('*')
      .order('started_at', { ascending:false })
      .limit(300);

    if (res.error){
      elStatus.textContent = 'שגיאת טעינה: ' + (res.error.message || 'unknown');
      return;
    }
    render(res.data || []);
  }

  load();
  setInterval(load, REFRESH_MS);
})();
</script>
</body>
</html>
