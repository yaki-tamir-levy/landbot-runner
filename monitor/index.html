<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BOT Monitor</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
    header {
      position: sticky;
      top: 0;
      background: #111;
      padding: 16px;
      border-bottom: 1px solid #333;
      z-index: 10;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }
    .meta {
      color: #aaa;
      font-size: 13px;
      line-height: 1.5;
    }
    main {
      padding: 12px;
    }
    .card {
      border: 1px solid #333;
      border-radius: 12px;
      margin-bottom: 12px;
      padding: 14px;
      background: #1b1b1b;
    }
    .card.completed {
      border-left: 5px solid #2ecc71;
    }
    .card.running {
      border-left: 5px solid #f39c12;
    }
    .card-head {
      margin-bottom: 12px;
    }
    .card-title {
      font-weight: bold;
      font-size: 18px;
      line-height: 1.35;
      margin-bottom: 6px;
    }
    .card-sub {
      color: #ccc;
      font-size: 13px;
      line-height: 1.6;
    }
    .source {
      font-weight: bold;
    }
    .event {
      padding: 8px 0;
      border-top: 1px solid #2c2c2c;
    }
    small {
      color: #999;
      font-size: 12px;
    }
    .error {
      border: 1px solid #c0392b;
      background: #2a1515;
      border-radius: 12px;
      padding: 14px;
      color: #ffd6d6;
    }
  </style>
</head>
<body>
  <header>
    <h1>BOT Monitor</h1>
    <div class="meta" id="meta">Loading...</div>
  </header>

  <main id="app"></main>

  <script>
    const API_URL = "https://qcwimczsiuxkarwfiyai.supabase.co/functions/v1/bot-monitor";
    const REFRESH_MS = 10000;

    function formatTime(value) {
      const date = value ? new Date(value) : new Date();
      return date.toLocaleTimeString("he-IL");
    }

    function formatHeaderDate(value) {
      if (!value) return "";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);

      const parts = new Intl.DateTimeFormat("he-IL", {
        timeZone: "Asia/Jerusalem",
        year: "2-digit",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).formatToParts(date);

      const part = (type) =>
        parts.find((item) => item.type === type)?.value ?? "";

      return `${part("day")}.${part("month")}.${part("year")} ${part("hour")}:${part("minute")}`;
    }

    function sourceLabel(value) {
      const source = String(value ?? "").trim().toUpperCase();

      if (source === "A") return "מטפל וירטואלי";
      if (source === "B") return "מדריך קורס";

      return source;
    }

    function displayStatus(value) {
      const status = String(value ?? "").trim();

      if (!status) return "";
      if (status.toLowerCase() === "completed") return "completed";
      if (status.toLowerCase() === "running") return "running";

      return status;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function firstEvent(conversation) {
      return conversation?.events?.[0] ?? {};
    }

    function conversationStartedAt(conversation) {
      const event = firstEvent(conversation);

      return conversation.started_at
        ?? conversation.process_started_at
        ?? event.started_at
        ?? event.process_started_at
        ?? event.created_at
        ?? "";
    }

    function conversationSource(conversation) {
      const event = firstEvent(conversation);
      return conversation.source ?? event.source ?? "";
    }

    function conversationStatus(conversation) {
      const event = firstEvent(conversation);

      return conversation.conversation_status
        ?? event.conversation_status
        ?? conversation.status
        ?? "";
    }

    function conversationPhone(conversation) {
      const event = firstEvent(conversation);
      return conversation.phone_masked ?? event.phone_masked ?? "";
    }

    function render(data) {
      const meta = document.getElementById("meta");
      const app = document.getElementById("app");

      meta.textContent =
        `Conversation Trace - Version 1.3 ${data.version} - Last refresh: ${formatTime(data.refreshed_at)}`;

      if (!data.conversations || data.conversations.length === 0) {
        app.innerHTML = "<p>No events found.</p>";
        return;
      }

      app.innerHTML = data.conversations.map((conversation) => {
        const startedAt =
          formatHeaderDate(conversationStartedAt(conversation));

        const source =
          sourceLabel(conversationSource(conversation));

        const status =
          displayStatus(conversationStatus(conversation));

        const phone =
          conversationPhone(conversation);

        const conversationLabel =
          `Conversation ${conversation.conversation_suffix}`;

        const titleParts = [
          startedAt,
          `${conversationLabel}${status ? ` ${status}` : ""}`,
        ].filter(Boolean);

        const title = titleParts.join(" | ");

        return `
          <section class="card ${conversation.completed ? "completed" : "running"}">
            <div class="card-head">
              <div class="card-title">
                ${escapeHtml(title)}
              </div>

              <div class="card-sub">
                ${source ? `<div class="source">${escapeHtml(source)}</div>` : ""}
                <div>${escapeHtml(phone)}</div>
              </div>
            </div>

            <div class="events">
              ${conversation.events.map((event) => `
                <div class="event">
                  <div>${escapeHtml(event.event_title)}</div>
                  <small>${escapeHtml(event.source_table)}</small>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    async function loadMonitor() {
      const app = document.getElementById("app");

      try {
        const response = await fetch(`${API_URL}?t=${Date.now()}`, {
          method: "GET",
          cache: "no-store",
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        render(data);
      } catch (error) {
        app.innerHTML =
          `<div class="error">Failed to load BOT Monitor: ${escapeHtml(error.message)}</div>`;
      }
    }

    loadMonitor();
    setInterval(loadMonitor, REFRESH_MS);
  </script>
</body>
</html>
