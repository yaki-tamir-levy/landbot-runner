name: Process users_total_v2 V2 (NEW → DONE/ERROR)

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: process-users-total-v2
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Run V2 processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: "false"
          MAX_ITEMS: "20"
        run: node ./scripts/process_users_total_v2.mjs
